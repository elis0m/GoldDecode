name: Backfill Gold History

on:
  workflow_dispatch:  # 수동 1회 실행

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Backfill 6 months of gold history
        run: python scripts/backfill_history.py
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}

      - name: Commit gold-history.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gold-history.json
          git diff --cached --quiet || git commit -m "chore: backfill 6 months gold history"
          git push
